name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare feature schema
        run: python -m src.data.make_dataset

      - name: Rebuild model artifacts
        run: python -m src.train.train_all

      - name: Ruff
        run: python -m ruff check .

      - name: Black
        run: python -m black --check .

      - name: Tests
        run: python -m pytest

      - name: Bandit
        run: python -m bandit -c pyproject.toml -r app src

      - name: pip-audit
        run: python -m pip_audit --local

      - name: Docker build
        run: docker build -t credit-default-service:ci .
