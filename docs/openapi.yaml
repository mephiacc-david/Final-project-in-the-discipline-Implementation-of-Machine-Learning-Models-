openapi: 3.0.3
info:
  title: Credit Default Inference Service
  version: 1.0.0
  description: Production-like Flask API for credit default prediction with v1/v2 model routing.
servers:
  - url: http://127.0.0.1:5000
paths:
  /health:
    get:
      summary: Service health status
      responses:
        "200":
          description: Service is healthy and mandatory models are loaded.
  /predict:
    post:
      summary: Predict default probability for a single client
      parameters:
        - in: header
          name: X-Experiment-Key
          schema:
            type: string
          required: false
          description: Stable key for deterministic 50/50 routing when model_version is absent.
        - in: header
          name: X-Request-ID
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                model_version:
                  type: string
                  enum: [v1, v2]
                features:
                  type: object
                  additionalProperties: false
                  required:
                    - LIMIT_BAL
                    - SEX
                    - EDUCATION
                    - MARRIAGE
                    - AGE
                    - PAY_0
                    - PAY_2
                    - PAY_3
                    - PAY_4
                    - PAY_5
                    - PAY_6
                    - BILL_AMT1
                    - BILL_AMT2
                    - BILL_AMT3
                    - BILL_AMT4
                    - BILL_AMT5
                    - BILL_AMT6
                    - PAY_AMT1
                    - PAY_AMT2
                    - PAY_AMT3
                    - PAY_AMT4
                    - PAY_AMT5
                    - PAY_AMT6
                  properties:
                    LIMIT_BAL: {type: integer}
                    SEX: {type: integer}
                    EDUCATION: {type: integer}
                    MARRIAGE: {type: integer}
                    AGE: {type: integer}
                    PAY_0: {type: integer}
                    PAY_2: {type: integer}
                    PAY_3: {type: integer}
                    PAY_4: {type: integer}
                    PAY_5: {type: integer}
                    PAY_6: {type: integer}
                    BILL_AMT1: {type: integer}
                    BILL_AMT2: {type: integer}
                    BILL_AMT3: {type: integer}
                    BILL_AMT4: {type: integer}
                    BILL_AMT5: {type: integer}
                    BILL_AMT6: {type: integer}
                    PAY_AMT1: {type: integer}
                    PAY_AMT2: {type: integer}
                    PAY_AMT3: {type: integer}
                    PAY_AMT4: {type: integer}
                    PAY_AMT5: {type: integer}
                    PAY_AMT6: {type: integer}
      responses:
        "200":
          description: Successful prediction response
        "400":
          description: Validation error
        "500":
          description: Internal runtime error

